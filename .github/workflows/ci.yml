name: CI

on:
  push:
    branches:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
        # cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.5.0'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - run: docker version
    - run: sudo apt-get install -yqq curl wget httpie
    - run: http --version --debug

    - run: |
        ./gradlew
        ./gradlew --stop
        #source <(curl -s https://raw.githubusercontent.com/daggerok/bash-functions/master/main.bash)
        source <(curl -s file://$(pwd)/main.bash)
        
        # run embedded kafka listening port 9092
        wget -O /tmp/kafka.jar https://github.com/daggerok/embedded-kafka/raw/mvn-repo/embedded-kafka-0.0.3-all.jar
        java -jar /tmp/kafka.jar &
        echo "wait_for 9092"
        wait_for 9092
        echo "kafka up and running"
        echo "stop_any 9092"
        stop_any 9092
        
        echo "docker run -d -p 5432:54321 -e POSTGRES_PASSWORD=password --rm --name pg --platform linux/amd64 healthcheck/postgres:alpine"
        docker run -d -p 5432:54321 -e POSTGRES_PASSWORD=password --rm --name pg --platform linux/amd64 healthcheck/postgres:alpine
        echo "wait_healthy_docker_containers"
        wait_healthy_docker_containers
        echo "docker stop pg"
        docker stop pg

        ## run nginx in docker and wait for listening port 80
        ## make a note: even if service not yet started, in this case lsof will show you pid (from docker I suppose...)
